<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Streaming de filmes de terror">
    <meta name="robots" content="filmes, streaming, terror">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>Plataforma de Streaming</title>
</head>
<body>
    <div class="container">
        <img class="logo" src="img/logoClaquete.png" alt="logomarca da CinemaCinema, claquete preta e branca em estilo cartoon pouco arredondado">
        <a href="#" class="header-btn"><img src="img/user-solid-full.png" alt="ícone de usuário"> Conta</a>
    </div>
    <div class="container movie-details">
        <div class="row">
            <div class="col-md-6 left-box">
                <h1>O Chamado</h1>
                <p>Uma fita causa grande desespero, visitas de uma criança chamada Samara e <br>uma investigação relâmpago sobre o que está acontecendo.</p>
                <p>Elenco:</p>
                <div class="casting">
                    <img src="img/elencoDaveigh.png" alt="retrato da atriz Daveigh Chase" title="Daveigh Chase">
                    <img src="img/elencoNaomi.png" alt="retrato da atriz Naomi Watts" title="Naomi Watts">
                    <img src="img/elencoMartin.png" alt="retrato do ator Martin Henderson" title="Martin Henderson">
                    <img src="img/elencoShannon.png" alt="retrato da atriz Shannon Cochran" title="Shannon Cochran">
                    <img src="img/elencoAmber.png" alt="retrato da atriz Amber Tamblyn" title="Amber Tamblyn">
                </div>
                <a href="#"><img src="img/play-solid-full.png" alt="triângulo deitado, símbolo de play"> Assistir agora</a>
                <a href="#" class="download-btn"><img src="img/arrow-down-solid-full.png" alt="seta para baixo"> Baixar</a>
            </div>
            <div class="col-md-6 text-center">
                <img src="img/posterChamado.png" alt='poster do filme O Chamado, com a Samara em frente ao poço centralizados dentro de um círculo brilhante. Abaixo aparece o título original do filme, "The Ring".' class="movie-img">
            </div>
        </div>
    </div>
    <div class="subtitles">
        <h3><strong>Filmes Populares</strong></h3>
    </div>
    <div class="container series">
        <img src="img/finalDestination.png" alt="poster do filme Premonição 6 (Final Destination Bloodlines)">
        <img src="img/theSubstance.png" alt="poster do filme A Substância">
        <img src="img/scream.png" alt="poster do primeiro filme da saga Pânico">
        <img src="img/bringHerBack.png" alt="poster do filme Faça Ela Voltar">
        <img src="img/nosferatu.png" alt="poster do remake de Nosferatu">
        <img src="img/sinners.png" alt="poster do filme Pecadores">
    </div>
</body>
</html>
